<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Net Topology Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ipaddr.js/2.1.0/ipaddr.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .grid-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }

        .animate-flow {
            stroke-dasharray: 6 4;
            animation: dash 0.5s linear infinite;
        }

        .fade-inactive {
            opacity: 0.25;
            filter: grayscale(100%);
            transition: opacity 0.3s, filter 0.3s;
        }

        .zone-bubble {
            transition: all 0.2s ease-out;
            pointer-events: none;
        }

        .no-pointer {
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col overflow-hidden text-slate-800">

    <header class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-md z-20 shrink-0">
        <div class="flex items-center gap-3">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400">
                <rect x="2" y="2" width="20" height="8" rx="2" />
                <rect x="2" y="14" width="20" height="8" rx="2" />
                <line x1="6" y1="6" x2="6.01" y2="6" />
                <line x1="6" y1="18" x2="6.01" y2="18" />
            </svg>
            <div>
                <h1 class="text-lg font-bold tracking-tight">NetTopology</h1>
                <p class="text-[10px] text-slate-400">Auto-Subnets • L2/L3 Routing • Validation</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <label class="flex items-center gap-1.5 cursor-pointer text-sm font-medium text-amber-400 hover:text-amber-300 transition" title="Trace reachable network paths from the selected node">
                <input type="checkbox" id="toggleTrace" class="rounded bg-slate-800 border-slate-600 accent-amber-500 w-4 h-4" />
                🔍 Reachability Trace
            </label>
            <span id="traceStatus" class="text-[10px] text-slate-400 min-w-[150px]">Trace off</span>

            <div class="w-px h-5 bg-slate-700 mx-1"></div>

            <label class="flex items-center gap-1.5 cursor-pointer text-sm font-medium text-slate-300 hover:text-white transition">
                <input type="checkbox" id="toggleConflicts" checked class="rounded bg-slate-800 border-slate-600 accent-blue-500 w-4 h-4" />
                Live Validation
            </label>

            <div class="w-px h-5 bg-slate-700 mx-1"></div>

            <select id="templateSelect" class="bg-slate-800 border border-slate-600 text-sm text-white px-2 py-1.5 rounded focus:outline-none focus:border-blue-500 transition cursor-pointer">
                <option value="house">🏠 Smart Home</option>
                <option value="bank">🏦 Bank Branch</option>
                <option value="datacenter">🏢 Data Center</option>
                <option value="hospital">🏥 Hospital</option>
                <option value="campus">🏢 Corporate Campus</option>
            </select>

            <button id="copyUrlBtn" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded text-xs font-medium transition flex items-center gap-2" title="Copy the shareable URL with the current diagram state">
                🔗 Copy URL
            </button>

            <button id="exportImageBtn" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded text-xs font-medium transition flex items-center gap-2">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                </svg>
                Export PNG
            </button>

            <button id="clearCanvasBtn" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded text-xs font-medium transition">Clear</button>
        </div>
    </header>

                        </div>

                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Validation Profile</label>
                                <select id="propZone" class="w-full border border-slate-300 rounded px-2 py-1 text-xs focus:outline-blue-500 bg-slate-50">
                                    <option value="lan">Standard (Warn missing GW)</option>
                                    <option value="isolated">Isolated (Ignore GW warnings)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Gateway</label>

                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">DNS</label>
                                <input type="text" id="propDns" placeholder="e.g. 8.8.8.8" class="w-full border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500" />

                            <div class="col-span-2">

                            </div>
                        </div>
                    </div>

                    <div id="nodeGeneralProps">

                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">OS</label>
                                <input type="text" id="propOs" list="osDatalist" class="w-full border border-slate-300 rounded px-2 py-1 text-xs focus:outline-blue-500" />
                                <datalist id="osDatalist"></datalist>
                            </div>
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Port(s)</label>
                                <input type="text" id="propPorts" placeholder="80, 443" class="w-full border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500" />
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Notes</label>
                            <textarea id="propNotes" rows="3" class="w-full border border-slate-300 rounded px-2 py-1 text-xs focus:outline-blue-500"></textarea>
                        </div>
                    </div>

                    <div class="pt-2 border-t border-slate-100 mt-auto">

            </div>
        </aside>

        <main class="flex-1 relative overflow-hidden grid-bg" id="canvasContainer">

                <button id="zoomOutBtn" class="p-2 hover:bg-slate-100" title="Zoom Out">➖</button>
            </div>
            <div class="absolute bottom-4 left-4 z-10 text-[10px] text-slate-500 bg-white/80 px-2 py-1 rounded shadow-sm">

            </div>
            <svg id="networkCanvas" class="w-full h-full absolute inset-0 select-none" xmlns="http://www.w3.org/2000/svg">
                <g id="workspace">

                    <g id="layer-links"></g>
                    <g id="layer-nodes"></g>
                </g>
            </svg>
        </main>

        function cloneData(data) {
            return JSON.parse(JSON.stringify(data));
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function getNode(id) {
            return state.nodes.find((n) => n.id === id) || null;
        }

        function getLink(id) {
            return state.links.find((l) => l.id === id) || null;
        }

        function getValidIps(node) {
            return (node.ips || []).map(parseValidCIDR).filter(Boolean);
        }

        function parseValidCIDR(cidrStr) {
            try {
                if (!cidrStr || !cidrStr.includes('/')) return null;

                const [ipStr, prefixStr] = cidrStr.split('/');
                const prefix = Number.parseInt(prefixStr, 10);
                const ip = ipaddr.parse(ipStr.trim());

                if (Number.isNaN(prefix)) return null;
                if (ip.kind() === 'ipv4' && (prefix < 0 || prefix > 32)) return null;
                if (ip.kind() === 'ipv6' && (prefix < 0 || prefix > 128)) return null;

                const cidrObj = ipaddr.parseCIDR(`${ip.toString()}/${prefix}`);
                let networkStr = `${ip.toString()}/${prefix}`;

                if (ip.kind() === 'ipv4') {
                    const octets = ip.octets;
                    const ipNum = ((octets[0] << 24) >>> 0) | (octets[1] << 16) | (octets[2] << 8) | octets[3];
                    const mask = prefix === 0 ? 0 : (0xffffffff << (32 - prefix)) >>> 0;
                    const netNum = (ipNum & mask) >>> 0;
                    const netIpv4 = [
                        (netNum >>> 24) & 255,
                        (netNum >>> 16) & 255,
                        (netNum >>> 8) & 255,
                        netNum & 255
                    ].join('.');
                    networkStr = `${netIpv4}/${prefix}`;
                }

                return { ip, prefix, kind: ip.kind(), cidrObj, networkStr };
            } catch (e) {
                return null;
            }
        }

        function calculateReachability(startNodeId) {
            const start = getNode(startNodeId);
            if (!start) return { reachableNodes: new Set(), reachableLinks: new Set() };

            const reachableNodes = new Set([startNodeId]);
            const reachableLinks = new Set();
            const queue = [startNodeId];
            const processed = new Set();

            function shareSubnet(a, b) {
                if (!a || !b) return false;
                if (a.type === 'cloud' || b.type === 'cloud') return true;

                const ipsA = getValidIps(a);
                const ipsB = getValidIps(b);
                if (!ipsA.length || !ipsB.length) return false;

                return ipsA.some((ia) => ipsB.some((ib) => ia.kind === ib.kind && ia.networkStr === ib.networkStr));
            }

            function isGateway(client, possibleGateway) {
                if (!client || !possibleGateway) return false;
                if (possibleGateway.type === 'cloud') return true;
                if (!client.gw) return false;

                try {
                    const gwIp = ipaddr.parse(client.gw.trim());
                    return getValidIps(possibleGateway).some((ib) => ib.ip.toString() === gwIp.toString());
                } catch (e) {
                    return false;
                }
            }

            function getL2Domain(originId) {
                const nodes = new Set([originId]);
                const links = new Set();
                const l2Queue = [originId];
                const l2Processed = new Set();

                while (l2Queue.length) {
                    const currentId = l2Queue.shift();
                    if (l2Processed.has(currentId)) continue;
                    l2Processed.add(currentId);

                    const adjacentLinks = state.links.filter((l) => l.source === currentId || l.target === currentId);
                    for (const link of adjacentLinks) {
                        const nextId = link.source === currentId ? link.target : link.source;
                        const nextNode = getNode(nextId);
                        if (!nextNode) continue;

                        if (isDumbDevice(nextNode.type) && !nodes.has(nextId)) {
                            nodes.add(nextId);
                            links.add(link.id);
                            l2Queue.push(nextId);
                        }
                    }
                }

                return { nodes, links };
            }

            function seedFromDumbDevice(dumbId) {
                const l2 = getL2Domain(dumbId);
                l2.nodes.forEach((id) => reachableNodes.add(id));
                l2.links.forEach((id) => reachableLinks.add(id));

                l2.nodes.forEach((l2id) => {
                    state.links.filter((l) => l.source === l2id || l.target === l2id).forEach((link) => {
                        const neighborId = link.source === l2id ? link.target : link.source;
                        const neighbor = getNode(neighborId);
                        if (!neighbor || isDumbDevice(neighbor.type)) return;
                        reachableNodes.add(neighborId);
                        reachableLinks.add(link.id);
                        queue.push(neighborId);
                    });
                });
            }

            if (isDumbDevice(start.type)) {
                seedFromDumbDevice(startNodeId);
            }

            while (queue.length) {
                const currentId = queue.shift();
                if (processed.has(currentId)) continue;
                processed.add(currentId);

                const currentNode = getNode(currentId);
                if (!currentNode) continue;

                const l2 = getL2Domain(currentId);
                l2.nodes.forEach((id) => reachableNodes.add(id));
                l2.links.forEach((id) => reachableLinks.add(id));

                const candidateDevices = new Set();
                const candidateLinks = new Map();

                l2.nodes.forEach((l2id) => {
                    state.links.filter((l) => l.source === l2id || l.target === l2id).forEach((link) => {
                        const neighborId = link.source === l2id ? link.target : link.source;
                        const neighbor = getNode(neighborId);
                        if (!neighbor || isDumbDevice(neighbor.type)) return;
                        candidateDevices.add(neighborId);
                        candidateLinks.set(neighborId, link.id);
                    });
                });

                candidateDevices.forEach((deviceId) => {
                    if (deviceId === currentId) return;

                    const device = getNode(deviceId);
                    if (!device) return;

                    if (shareSubnet(currentNode, device)) {
                        reachableNodes.add(deviceId);
                        if (candidateLinks.has(deviceId)) reachableLinks.add(candidateLinks.get(deviceId));

                        const currentCanRoute = isRoutingDevice(currentNode.type);
                        const deviceCanRoute = isRoutingDevice(device.type);
                        const viaGateway = isGateway(currentNode, device) || isGateway(device, currentNode);

                        if (deviceCanRoute && (viaGateway || currentCanRoute)) {
                            queue.push(deviceId);
                        }
                    }
                });
            }

            return { reachableNodes, reachableLinks };
        }

        function validateTopology() {
            const alertBox = document.getElementById('conflictAlert');
            const msgList = document.getElementById('conflictMsgList');

            if (!state.settings.showConflicts) {
                alertBox.classList.add('hidden');
                return;
            }

            const errors = [];
            const ipMap = {};

            state.nodes.forEach((node) => {
                getValidIps(node).forEach((parsed) => {
                    const ip = parsed.ip.toString();
                    if (!ipMap[ip]) ipMap[ip] = [];
                    ipMap[ip].push(node.name || node.id);
                });

                if (node.zone !== 'isolated' && !isDumbDevice(node.type)) {
                    const validIPs = getValidIps(node);

                    if (node.gw && validIPs.length) {
                        try {
                            const gwIp = ipaddr.parse(node.gw.trim());
                            const gatewayOnLocalSubnet = validIPs.some((local) => gwIp.match(local.cidrObj));
                            if (!gatewayOnLocalSubnet) {
                                errors.push(`${node.name}: Gateway ${node.gw} is not on a local subnet.`);
                            }
                        } catch (e) {
                            errors.push(`${node.name}: Invalid gateway value.`);
                        }
                    }
                }
            });

            Object.entries(ipMap).forEach(([ip, names]) => {
                if (names.length > 1) {
                    errors.push(`IP Conflict: ${ip} on ${names.join(', ')}.`);
                }
            });

            if (errors.length) {
                msgList.innerHTML = errors.map((e) => `<li>${escapeHtml(e)}</li>`).join('');
                alertBox.classList.remove('hidden');
            } else {
                alertBox.classList.add('hidden');
            }
        }

        function updateTraceStatus(reach) {
            const el = document.getElementById('traceStatus');
            if (!el) return;

            if (!state.settings.traceMode) {
                el.textContent = 'Trace off';
                el.className = 'text-[10px] text-slate-400 min-w-[150px]';
                return;
            }

            if (!state.selectedId || state.selectedType !== 'node') {
                el.textContent = 'Trace on: select a node';
                el.className = 'text-[10px] text-amber-300 min-w-[150px]';
                return;
            }

            const node = getNode(state.selectedId);
            const count = reach ? Math.max(0, reach.reachableNodes.size - 1) : 0;
            el.textContent = `From ${node?.name || 'node'}: ${count} reachable`;
            el.className = 'text-[10px] text-amber-300 min-w-[150px]';
        }

        function renderCanvasOnly() {
            lZones.innerHTML = '';
            lLinks.innerHTML = '';
            lNodes.innerHTML = '';

            const subnets = {};
            state.nodes.forEach((node) => {
                getValidIps(node).forEach((ipData) => {
                    const subnet = ipData.networkStr;
                    if (!subnets[subnet]) subnets[subnet] = [];
                    subnets[subnet].push(node);
                });
            });

            Object.entries(subnets).forEach(([subnet, nodes]) => {
                if (!nodes.length) return;

                let minX = Infinity;
                let minY = Infinity;
                let maxX = -Infinity;
                let maxY = -Infinity;

                nodes.forEach((node) => {
                    minX = Math.min(minX, node.x);
                    minY = Math.min(minY, node.y);
                    maxX = Math.max(maxX, node.x);
                    maxY = Math.max(maxY, node.y);
                });

                const pad = 45;
                const hue = Array.from(subnet).reduce((a, c) => a + c.charCodeAt(0), 0) % 360;

                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'zone-bubble');

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', minX - pad);
                rect.setAttribute('y', minY - pad);
                rect.setAttribute('width', maxX - minX + pad * 2);
                rect.setAttribute('height', maxY - minY + pad * 2);
                rect.setAttribute('rx', '16');
                rect.setAttribute('fill', `hsla(${hue}, 70%, 50%, 0.06)`);
                rect.setAttribute('stroke', `hsla(${hue}, 70%, 50%, 0.3)`);
                rect.setAttribute('stroke-dasharray', '8 4');
                rect.setAttribute('stroke-width', '2');
                g.appendChild(rect);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', minX - pad + 12);
                text.setAttribute('y', minY - pad + 20);
                text.setAttribute('font-size', '11');
                text.setAttribute('font-family', 'monospace');
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('fill', `hsla(${hue}, 70%, 40%, 0.7)`);
                text.textContent = subnet;
                g.appendChild(text);

                lZones.appendChild(g);
            });

            const reach = state.settings.traceMode && state.selectedId && state.selectedType === 'node'
                ? calculateReachability(state.selectedId)
                : null;

            state.links.forEach((link) => {
                const src = getNode(link.source);
                const tgt = getNode(link.target);
                if (!src || !tgt) return;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', src.x);
                line.setAttribute('y1', src.y);
                line.setAttribute('x2', tgt.x);
                line.setAttribute('y2', tgt.y);

                const isSelected = state.selectedId === link.id && state.selectedType === 'link';
                const isWireless = src.type === 'ap' || tgt.type === 'ap';

                if (reach && reach.reachableLinks.has(link.id)) {
                    line.setAttribute('stroke', '#f59e0b');
                    line.setAttribute('stroke-width', '3');
                    line.setAttribute('class', 'animate-flow cursor-pointer');
                } else {
                    line.setAttribute('stroke', isSelected ? '#3b82f6' : '#94a3b8');
                    line.setAttribute('stroke-width', isSelected ? '3' : '2');
                    line.setAttribute('class', reach ? 'fade-inactive cursor-pointer' : 'cursor-pointer transition-colors');
                    if (isWireless) line.setAttribute('stroke-dasharray', '4 4');
                }

                line.addEventListener('mousedown', (event) => {
                    event.stopPropagation();
                    select(link.id, 'link');
                });

                lLinks.appendChild(line);
            });

            state.nodes.forEach((node) => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('transform', `translate(${node.x}, ${node.y})`);

                const isSelected = state.selectedId === node.id && state.selectedType === 'node';
                const isLinkSource = state.linkSourceId === node.id;
                const isReachable = reach && reach.reachableNodes.has(node.id);
                const isInactiveTraceNode = reach && !isReachable;

                if (isInactiveTraceNode) {
                    g.setAttribute('class', 'fade-inactive');
                } else {
                    g.setAttribute('class', state.mode === 'drag' ? 'cursor-grab active:cursor-grabbing' : 'cursor-crosshair');
                }

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', '-24');
                rect.setAttribute('y', '-24');
                rect.setAttribute('width', '48');
                rect.setAttribute('height', '48');
                rect.setAttribute('rx', '6');

                if (isLinkSource) {
                    rect.setAttribute('fill', '#fff7ed');
                    rect.setAttribute('stroke', '#f97316');
                    rect.setAttribute('stroke-width', '3');
                } else if (isSelected) {
                    rect.setAttribute('fill', '#eff6ff');
                    rect.setAttribute('stroke', '#3b82f6');
                    rect.setAttribute('stroke-width', '2');
                } else if (isReachable) {
                    rect.setAttribute('fill', '#fffbeb');
                    rect.setAttribute('stroke', '#fcd34d');
                    rect.setAttribute('stroke-width', '2.5');
                } else {
                    rect.setAttribute('fill', '#ffffff');
                    rect.setAttribute('stroke', '#cbd5e1');
                    rect.setAttribute('stroke-width', '1.5');
                }

                if (node.type === 'vm') rect.setAttribute('stroke-dasharray', '4 3');
                rect.style.transition = 'all 0.1s ease';
                g.appendChild(rect);

                const iconG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                iconG.setAttribute('transform', 'translate(-12, -14)');
                iconG.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" stroke="#334155" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">${iconPaths[node.type] || iconPaths.custom}</svg>`;
                iconG.style.pointerEvents = 'none';
                g.appendChild(iconG);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('text-anchor', 'middle');
                label.setAttribute('y', '36');
                label.setAttribute('font-size', '10');
                label.setAttribute('font-weight', '600');
                label.setAttribute('fill', '#334155');
                label.textContent = node.name;
                label.style.pointerEvents = 'none';
                g.appendChild(label);

                if (isLinkSource) {
                    const hint = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    hint.setAttribute('text-anchor', 'middle');
                    hint.setAttribute('y', '-34');
                    hint.setAttribute('font-size', '9');
                    hint.setAttribute('font-weight', '700');
                    hint.setAttribute('fill', '#ea580c');
                    hint.textContent = 'LINK SOURCE';
                    hint.style.pointerEvents = 'none';
                    g.appendChild(hint);
                }

                if (!isDumbDevice(node.type) && node.ips && node.ips.length > 0) {
                    const validDisplayIps = node.ips.filter((i) => i.trim() !== '');
                    validDisplayIps.slice(0, 2).forEach((ip, idx) => {
                        const ipLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        ipLabel.setAttribute('text-anchor', 'middle');
                        ipLabel.setAttribute('y', String(48 + idx * 10));
                        ipLabel.setAttribute('font-size', '8');
                        ipLabel.setAttribute('font-family', 'monospace');
                        ipLabel.setAttribute('fill', '#64748b');

                        let text = ip;
                        if (idx === 1 && validDisplayIps.length > 2) {
                            text += ` (+${validDisplayIps.length - 2})`;
                        }
                        ipLabel.textContent = text;
                        ipLabel.style.pointerEvents = 'none';
                        g.appendChild(ipLabel);
                    });
                }

                g.addEventListener('mousedown', (event) => {
                    event.stopPropagation();

                    if (state.mode === 'drag') {
                        isDraggingNode = true;
                        draggedNode = node;
                        const pt = getWorkspacePoint(event.clientX, event.clientY);
                        dragOffset.x = pt.x - node.x;
                        dragOffset.y = pt.y - node.y;
                        select(node.id, 'node');
                        return;
                    }

                    if (state.mode === 'link') {
                        if (!state.linkSourceId) {
                            state.linkSourceId = node.id;
                            updateModeHelp();
                            renderCanvasOnly();
                            return;
                        }

                        if (state.linkSourceId !== node.id) {
                            const duplicate = state.links.find((l) =>
                                (l.source === state.linkSourceId && l.target === node.id) ||
                                (l.source === node.id && l.target === state.linkSourceId)
                            );

                            if (!duplicate) {
                                state.links.push({
                                    id: `l_${Date.now()}`,
                                    source: state.linkSourceId,
                                    target: node.id
                                });
                            }
                        }

                        state.linkSourceId = null;
                        updateModeHelp();
                        save();
                        renderCanvasOnly();
                    }
                });

                lNodes.appendChild(g);
            });

            updateTraceStatus(reach);
            validateTopology();
        }

        function renderSidebarIPs(node) {
            const cont = document.getElementById('ipListContainer');
            cont.innerHTML = '';
            node.ips = node.ips || [];

            if (!node.ips.length) {
                cont.innerHTML = '<span class="text-[10px] text-slate-400 italic">No IPs configured.</span>';
                return;
            }

            node.ips.forEach((ip, i) => {
                const div = document.createElement('div');
                div.className = 'flex items-center gap-1';

                const inp = document.createElement('input');
                inp.type = 'text';
                inp.value = ip;
                inp.placeholder = 'CIDR';
                inp.className = 'flex-1 border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500 w-full';

                if (ip.trim() !== '' && !parseValidCIDR(ip)) {
                    inp.classList.add('border-red-400', 'bg-red-50');
                }

                inp.addEventListener('input', (event) => {
                    node.ips[i] = event.target.value;
                    if (node.ips[i].trim() !== '' && !parseValidCIDR(node.ips[i])) {
                        inp.classList.add('border-red-400', 'bg-red-50');
                    } else {
                        inp.classList.remove('border-red-400', 'bg-red-50');
                    }
                    save();
                    renderCanvasOnly();
                });

                const del = document.createElement('button');
                del.innerHTML = '✖';
                del.className = 'text-slate-400 hover:text-red-500 px-1';
                del.onclick = () => {
                    node.ips.splice(i, 1);
                    save();
                    renderCanvasOnly();
                    renderSidebarIPs(node);
                };

                div.appendChild(inp);
                div.appendChild(del);
                cont.appendChild(div);
            });
        }

        function clearPropertyInputs() {
            document.getElementById('propName').value = '';
            document.getElementById('propGw').value = '';
            document.getElementById('propDns').value = '';
            document.getElementById('propOs').value = '';
            document.getElementById('propPorts').value = '';
            document.getElementById('propNotes').value = '';
            document.getElementById('propZone').value = 'lan';
            document.getElementById('ipListContainer').innerHTML = '';
            document.getElementById('jumpGwBtn').classList.add('hidden');
        }

        function select(id, type) {
            state.selectedId = id;
            state.selectedType = type;
            state.linkSourceId = null;
            updateModeHelp();

            const pPane = document.getElementById('propertiesPane');
            const nPane = document.getElementById('noSelectionPane');
            const netProps = document.getElementById('nodeNetworkProps');
            const generalProps = document.getElementById('nodeGeneralProps');
            const nameInput = document.getElementById('propName');
            const jumpGwBtn = document.getElementById('jumpGwBtn');

            if (!id) {
                clearPropertyInputs();
                pPane.classList.add('hidden');
                pPane.classList.remove('flex');
                nPane.classList.remove('hidden');
                renderCanvasOnly();
                return;
            }

            nPane.classList.add('hidden');
            pPane.classList.remove('hidden');
            pPane.classList.add('flex');

            if (type === 'node') {
                const node = getNode(id);
                if (!node) return;

                nameInput.value = node.name || '';
                nameInput.disabled = false;

                generalProps.classList.remove('hidden');
                document.getElementById('propNotes').value = node.notes || '';
                document.getElementById('propOs').value = node.os || '';
                document.getElementById('propPorts').value = node.ports || '';

                if (isDumbDevice(node.type)) {
                    netProps.classList.add('hidden');
                    jumpGwBtn.classList.add('hidden');
                } else {
                    netProps.classList.remove('hidden');
                    document.getElementById('propZone').value = node.zone || 'lan';
                    document.getElementById('propGw').value = node.gw || '';
                    document.getElementById('propDns').value = node.dns || '';
                    renderSidebarIPs(node);

                    if (node.gw && node.gw.trim() !== '') {
                        jumpGwBtn.classList.remove('hidden');
                        jumpGwBtn.onclick = () => {
                            const gwIpStr = node.gw.trim();
                            const targetNode = state.nodes.find((n) => 
                                getValidIps(n).some((ipData) => ipData.ip.toString() === gwIpStr)
                            );

                            if (targetNode) {
                                const rect = document.getElementById('networkCanvas').getBoundingClientRect();
                                state.camera.x = (rect.width / 2) - targetNode.x * state.camera.zoom;
                                state.camera.y = (rect.height / 2) - targetNode.y * state.camera.zoom;
                                applyCamera();
                                select(targetNode.id, 'node');
                            } else {
                                alert(`Gateway node (${gwIpStr}) not found in the topology.`);
                            }
                        };
                    } else {
                        jumpGwBtn.classList.add('hidden');
                    }
                }
            } else if (type === 'link') {
                const link = getLink(id);
                if (!link) return;

                const a = getNode(link.source);
                const b = getNode(link.target);

                nameInput.value = `${a?.name || link.source} ↔ ${b?.name || link.target}`;
                nameInput.disabled = true;

                netProps.classList.add('hidden');
                generalProps.classList.add('hidden');
            }

            renderCanvasOnly();
        }

        function spawnNode(type) {
            const rect = document.getElementById('networkCanvas').getBoundingClientRect();
            const defs = initialDataDefaults[type] || { os: '', ports: '', zone: 'lan', ips: [] };
            const palette = paletteDefs.find((p) => p.type === type);

            const sx = Math.round(((rect.width / 2 - state.camera.x) / state.camera.zoom + (state.nodes.length % 6) * 20) / GRID_SNAP) * GRID_SNAP;
            const sy = Math.round(((rect.height / 2 - state.camera.y) / state.camera.zoom + (state.nodes.length % 6) * 20) / GRID_SNAP) * GRID_SNAP;

            const node = {
                id: `n_${Date.now()}`,
                type,
                name: `New ${palette?.name || 'Node'}`,
                x: sx,
                y: sy,
                ips: [...(defs.ips || [])],
                gw: defs.gw || '',
                dns: defs.dns || '',
                os: defs.os || '',
                ports: defs.ports || '',
                notes: '',
                zone: defs.zone || 'lan'
            };

            state.nodes.push(node);
            select(node.id, 'node');
            save();
            renderCanvasOnly();
        }

        function getWorkspacePoint(clientX, clientY) {
            const rect = document.getElementById('networkCanvas').getBoundingClientRect();
            return {
                x: (clientX - rect.left - state.camera.x) / state.camera.zoom,
                y: (clientY - rect.top - state.camera.y) / state.camera.zoom
            };
        }

        function applyCamera() {
            document.getElementById('workspace').setAttribute('transform', `translate(${state.camera.x}, ${state.camera.y}) scale(${state.camera.zoom})`);

            const backgroundSize = GRID_SNAP * state.camera.zoom;
            const canvasContainer = document.getElementById('canvasContainer');
            canvasContainer.style.backgroundSize = `${backgroundSize}px ${backgroundSize}px`;
            canvasContainer.style.backgroundPosition = `${state.camera.x}px ${state.camera.y}px`;
        }

        function updateOsDatalist() {
            const dl = document.getElementById('osDatalist');
            dl.innerHTML = '';
            new Set(state.nodes.map((n) => n.os).filter(Boolean)).forEach((os) => {
                dl.appendChild(new Option(os, os));
            });
        }

        function save() {
            try {
                const cleanNodes = state.nodes.map((n) => ({
                    id: n.id,
                    type: n.type,
                    name: n.name,
                    x: n.x,
                    y: n.y,
                    ips: (n.ips || []).filter((i) => i.trim() !== ''),
                    gw: n.gw || '',
                    dns: n.dns || '',
                    os: n.os || '',
                    ports: n.ports || '',
                    notes: n.notes || '',
                    zone: n.zone || 'lan'
                }));

                const cleanLinks = state.links.map((l) => ({
                    id: l.id,
                    source: l.source,
                    target: l.target
                }));

                const encoded = btoa(encodeURIComponent(JSON.stringify({ nodes: cleanNodes, links: cleanLinks })));
                window.history.replaceState(null, '', `#${encoded}`);
                updateOsDatalist();
            } catch (err) {
                console.warn('Could not save diagram state to URL hash:', err);
            }
        }

        function normalizeLoadedNode(node) {
            return {
                id: node.id || `n_${Date.now()}_${Math.random().toString(16).slice(2)}`,
                type: node.type || 'custom',
                name: node.name || 'Unnamed Node',
                x: Number.isFinite(node.x) ? node.x : 200,
                y: Number.isFinite(node.y) ? node.y : 200,
                ips: Array.isArray(node.ips) ? node.ips : [],
                gw: node.gw || '',
                dns: node.dns || '',
                os: node.os || '',
                ports: node.ports || '',
                notes: node.notes || '',
                zone: node.zone || 'lan'
            };
        }

        function load() {
            const hash = window.location.hash.substring(1);

            if (!hash) {
                state.nodes = cloneData(templatesData.house.nodes).map(normalizeLoadedNode);
                state.links = cloneData(templatesData.house.links);
                updateOsDatalist();
                return;
            }

            try {
                const parsed = JSON.parse(decodeURIComponent(atob(hash)));
                state.nodes = (parsed.nodes || []).map(normalizeLoadedNode);
                state.links = Array.isArray(parsed.links) ? parsed.links : [];
                updateOsDatalist();
            } catch (e) {
                console.warn('Invalid URL hash. Loading default template instead.', e);
                state.nodes = cloneData(templatesData.house.nodes).map(normalizeLoadedNode);
                state.links = cloneData(templatesData.house.links);
                updateOsDatalist();
            }
        }

        function updateModeHelp() {
            const help = document.getElementById('modeHelp');
            if (!help) return;

            if (state.mode === 'drag') {
                help.textContent = 'Drag mode: move nodes or pan the canvas.';
                return;
            }

            if (state.linkSourceId) {
                const source = getNode(state.linkSourceId);
                help.textContent = `Link mode: ${source?.name || 'source'} selected. Click another node to create a link.`;
            } else {
                help.textContent = 'Link mode: click node A, then node B.';
            }
        }

        function setMode(mode) {
            state.mode = mode;
            state.linkSourceId = null;

            const dragBtn = document.getElementById('modeDrag');
            const linkBtn = document.getElementById('modeLink');

            if (mode === 'drag') {
                dragBtn.className = 'flex-1 text-center py-1 text-xs font-medium rounded bg-white text-slate-900 shadow-sm transition';
                linkBtn.className = 'flex-1 text-center py-1 text-xs font-medium rounded text-slate-600 hover:text-slate-900 transition';
            } else {
                linkBtn.className = 'flex-1 text-center py-1 text-xs font-medium rounded bg-white text-slate-900 shadow-sm transition';
                dragBtn.className = 'flex-1 text-center py-1 text-xs font-medium rounded text-slate-600 hover:text-slate-900 transition';
                select(null, null);
            }

            updateModeHelp();
            renderCanvasOnly();
        }

        function deleteSelected() {
            if (!state.selectedId) return;

            if (state.selectedType === 'node') {
                state.nodes = state.nodes.filter((n) => n.id !== state.selectedId);
                state.links = state.links.filter((l) => l.source !== state.selectedId && l.target !== state.selectedId);
            } else if (state.selectedType === 'link') {
                state.links = state.links.filter((l) => l.id !== state.selectedId);
            }

            select(null, null);
            save();
            renderCanvasOnly();
        }

        window.addEventListener('mousedown', (event) => {
            if (event.target.id === 'networkCanvas' && (event.button === 1 || event.button === 0)) {
                isDraggingCanvas = true;
                lastMouse = { x: event.clientX, y: event.clientY };

                if (event.button === 0 && !isDraggingNode) {
                    select(null, null);
                }
            }
        });

        window.addEventListener('mousemove', (event) => {
            if (isDraggingCanvas && !isDraggingNode) {
                state.camera.x += event.clientX - lastMouse.x;
                state.camera.y += event.clientY - lastMouse.y;
                lastMouse = { x: event.clientX, y: event.clientY };
                applyCamera();
            } else if (isDraggingNode && draggedNode) {
                const pt = getWorkspacePoint(event.clientX, event.clientY);
                draggedNode.x = Math.round((pt.x - dragOffset.x) / GRID_SNAP) * GRID_SNAP;
                draggedNode.y = Math.round((pt.y - dragOffset.y) / GRID_SNAP) * GRID_SNAP;
                renderCanvasOnly();
            }
        });

        window.addEventListener('mouseup', () => {
            isDraggingCanvas = false;

            if (isDraggingNode) {
                isDraggingNode = false;
                draggedNode = null;
                save();
            }
        });

        document.getElementById('networkCanvas').addEventListener('wheel', (event) => {
            event.preventDefault();

            const rect = document.getElementById('networkCanvas').getBoundingClientRect();
            const mx = event.clientX - rect.left;
            const my = event.clientY - rect.top;
            const nextZoom = Math.min(Math.max(0.2, state.camera.zoom * Math.exp(-event.deltaY * 0.001)), 5);

            state.camera.x = mx - (mx - state.camera.x) * (nextZoom / state.camera.zoom);
            state.camera.y = my - (my - state.camera.y) * (nextZoom / state.camera.zoom);
            state.camera.zoom = nextZoom;
            applyCamera();
        }, { passive: false });

        window.addEventListener('keydown', (event) => {
            const tagName = document.activeElement?.tagName || '';
            if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tagName)) return;

            if (event.key === 'Delete' || event.key === 'Backspace') {
                deleteSelected();
            }

            if (event.key === 'Escape') {
                state.linkSourceId = null;
                select(null, null);
                updateModeHelp();
            }
        });

        document.getElementById('templateSelect').addEventListener('change', (event) => {
            if (!confirm('Replace current workspace with template?')) {
                return;
            }

            const template = templatesData[event.target.value] || templatesData.house;
            state.nodes = cloneData(template.nodes).map(normalizeLoadedNode);
            state.links = cloneData(template.links);
            state.selectedId = null;
            state.selectedType = null;
            state.linkSourceId = null;
            state.camera = { x: 0, y: 0, zoom: 1 };
            applyCamera();
            select(null, null);
            save();
            renderCanvasOnly();
        });

        const propertyBindings = [
            { key: 'name', id: 'propName', event: 'input' },
            { key: 'gw', id: 'propGw', event: 'input' },
            { key: 'dns', id: 'propDns', event: 'input' },
            { key: 'os', id: 'propOs', event: 'input' },
            { key: 'ports', id: 'propPorts', event: 'input' },
            { key: 'notes', id: 'propNotes', event: 'input' },
            { key: 'zone', id: 'propZone', event: 'change' }
        ];

        propertyBindings.forEach((binding) => {
            const el = document.getElementById(binding.id);
            el.addEventListener(binding.event, (event) => {
                if (!state.selectedId || state.selectedType !== 'node') return;

                const node = getNode(state.selectedId);
                if (!node) return;

                node[binding.key] = event.target.value;
                save();
                renderCanvasOnly();
            });
        });

        document.getElementById('addIpBtn').onclick = () => {
            if (!state.selectedId || state.selectedType !== 'node') return;

            const node = getNode(state.selectedId);
            if (!node) return;

            node.ips = node.ips || [];
            node.ips.push('');
            renderSidebarIPs(node);
            save();
            renderCanvasOnly();
        };

        document.getElementById('deleteElementBtn').onclick = deleteSelected;

        document.getElementById('zoomInBtn').onclick = () => {
            state.camera.zoom = Math.min(5, state.camera.zoom * 1.2);
            applyCamera();
        };

        document.getElementById('zoomOutBtn').onclick = () => {
            state.camera.zoom = Math.max(0.2, state.camera.zoom / 1.2);
            applyCamera();
        };

        document.getElementById('zoomResetBtn').onclick = () => {
            state.camera.x = 0;
            state.camera.y = 0;
            state.camera.zoom = 1;
            applyCamera();
        };

        document.getElementById('clearCanvasBtn').onclick = () => {
            if (!confirm('Clear canvas?')) return;

            state.nodes = [];
            state.links = [];
            state.selectedId = null;
            state.selectedType = null;
            state.linkSourceId = null;
            save();
            select(null, null);
            renderCanvasOnly();
        };

        document.getElementById('copyUrlBtn').onclick = async () => {
            save();
            try {
                await navigator.clipboard.writeText(window.location.href);
                alert('URL copied.');
            } catch (e) {
                prompt('Copy this URL:', window.location.href);
            }
        };

        document.getElementById('toggleConflicts').addEventListener('change', (event) => {
            state.settings.showConflicts = event.target.checked;
            validateTopology();
        });

        document.getElementById('toggleTrace').addEventListener('change', (event) => {
            state.settings.traceMode = event.target.checked;
            renderCanvasOnly();
        });

        document.getElementById('modeDrag').onclick = () => setMode('drag');
        document.getElementById('modeLink').onclick = () => setMode('link');

        document.getElementById('exportImageBtn').onclick = () => {
            if (!state.nodes.length) {
                alert('Nothing to export. Add at least one node first.');
                return;
            }

            const PADDING = 90;
            const NODE_HALF_SIZE = 24;
            const LABEL_EXTRA_BOTTOM = 42;
            const SCALE = 4;

            let minX = Infinity;
            let minY = Infinity;
            let maxX = -Infinity;
            let maxY = -Infinity;

            state.nodes.forEach((node) => {
                minX = Math.min(minX, node.x - NODE_HALF_SIZE);
                minY = Math.min(minY, node.y - NODE_HALF_SIZE);
                maxX = Math.max(maxX, node.x + NODE_HALF_SIZE);
                maxY = Math.max(maxY, node.y + NODE_HALF_SIZE + LABEL_EXTRA_BOTTOM);
            });

            minX -= PADDING;
            minY -= PADDING;
            maxX += PADDING;
            maxY += PADDING;

            const exportWidth = Math.max(1, Math.ceil(maxX - minX));
            const exportHeight = Math.max(1, Math.ceil(maxY - minY));

            const originalCamera = {
                x: state.camera.x,
                y: state.camera.y,
                zoom: state.camera.zoom
            };

            const svg = document.getElementById('networkCanvas');
            const workspace = document.getElementById('workspace');

            workspace.setAttribute('transform', `translate(${-minX}, ${-minY}) scale(1)`);
            svg.setAttribute('width', exportWidth * SCALE);
            svg.setAttribute('height', exportHeight * SCALE);
            svg.setAttribute('viewBox', `0 0 ${exportWidth} ${exportHeight}`);

            let serialized = new XMLSerializer().serializeToString(svg);

            svg.removeAttribute('width');
            svg.removeAttribute('height');
            svg.removeAttribute('viewBox');

            state.camera = originalCamera;
            applyCamera();
            renderCanvasOnly();

            if (!serialized.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                serialized = serialized.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
            }

            const url = URL.createObjectURL(new Blob([serialized], { type: 'image/svg+xml;charset=utf-8' }));
            const img = new Image();

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = exportWidth * SCALE;
                canvas.height = exportHeight * SCALE;

                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#cbd5e1';
                ctx.scale(SCALE, SCALE);
                for (let x = ((-minX) % GRID_SNAP + GRID_SNAP) % GRID_SNAP; x < exportWidth; x += GRID_SNAP) {
                    for (let y = ((-minY) % GRID_SNAP + GRID_SNAP) % GRID_SNAP; y < exportHeight; y += GRID_SNAP) {
                        ctx.beginPath();
                        ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                ctx.setTransform(1, 0, 0, 1, 0, 0);

                ctx.drawImage(img, 0, 0, exportWidth * SCALE, exportHeight * SCALE);

                const a = document.createElement('a');
                a.href = canvas.toDataURL('image/png');
                a.download = 'network-diagram.png';
                a.click();

                URL.revokeObjectURL(url);
            };

            img.onerror = () => {
                URL.revokeObjectURL(url);
                alert('Could not export image.');
            };

            img.src = url;
        };

        window.addEventListener('popstate', () => {
            load();
            renderCanvasOnly();
        });

        load();
        applyCamera();
        updateModeHelp();
        renderCanvasOnly();

    </script>
</body>
</html>
