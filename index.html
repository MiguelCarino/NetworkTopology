<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Network Diagrammer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ipaddr.js/2.1.0/ipaddr.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        
        .grid-bg {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Header -->
    <header class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-md z-20 shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🌐</span>
            <div>
                <h1 class="text-lg font-bold tracking-tight">NetTopology Pro</h1>
                <p class="text-[10px] text-slate-400">IPv4/IPv6 • Subnet validation • URL persistent</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <label class="flex items-center gap-2 cursor-pointer text-sm font-medium text-slate-300 hover:text-white transition">
                <input type="checkbox" id="toggleConflicts" checked class="rounded bg-slate-800 border-slate-600 accent-blue-500 w-4 h-4">
                Live Validation
            </label>
            <div class="w-px h-6 bg-slate-700"></div>
            <button id="exportImageBtn" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded text-xs font-medium transition flex items-center gap-2">
                <span>🖼️</span> Export PNG
            </button>
            <button id="copyUrlBtn" class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded text-xs font-medium transition flex items-center gap-2">
                <span>🔗</span> Share Link
            </button>
            <button id="clearCanvasBtn" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded text-xs font-medium transition">
                Clear
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Sidebar -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-10 h-full">
            
            <!-- Mode Toggle -->
            <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">1. Action Mode</h2>
                <div class="flex rounded shadow-sm bg-slate-200 p-1">
                    <button id="modeDrag" class="flex-1 text-center py-1 text-xs font-medium rounded bg-white text-slate-900 shadow-sm transition">
                        🖐️ Drag
                    </button>
                    <button id="modeLink" class="flex-1 text-center py-1 text-xs font-medium rounded text-slate-600 hover:text-slate-900 transition">
                        🔌 Link
                    </button>
                </div>
            </div>

            <!-- Node Palette -->
            <div class="p-4 border-b border-slate-100 flex-1 overflow-y-auto">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">2. Library</h2>
                <div class="grid grid-cols-2 gap-2" id="nodePalette">
                    <button data-type="cloud" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">☁️</span> <span class="text-[10px] font-medium mt-1">Cloud</span>
                    </button>
                    <button data-type="router" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">⎔</span> <span class="text-[10px] font-medium mt-1">Router</span>
                    </button>
                    <button data-type="firewall" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">🧱</span> <span class="text-[10px] font-medium mt-1">Firewall</span>
                    </button>
                    <button data-type="switch" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">☴</span> <span class="text-[10px] font-medium mt-1">Switch</span>
                    </button>
                    <button data-type="server" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">🖥️</span> <span class="text-[10px] font-medium mt-1">Server</span>
                    </button>
                    <button data-type="pc" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">💻</span> <span class="text-[10px] font-medium mt-1">Workstation</span>
                    </button>
                    <button data-type="iot" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">📡</span> <span class="text-[10px] font-medium mt-1">IoT Device</span>
                    </button>
                    <button data-type="dicom" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer">
                        <span class="text-xl">🏥</span> <span class="text-[10px] font-medium mt-1">Medical/DICOM</span>
                    </button>
                    <button data-type="custom" class="palette-item flex flex-col items-center p-2 bg-slate-50 border border-slate-200 rounded hover:border-blue-400 hover:bg-blue-50 cursor-pointer col-span-2">
                        <span class="text-xl">📦</span> <span class="text-[10px] font-medium mt-1">Custom Node</span>
                    </button>
                </div>
            </div>

            <!-- Properties Panel -->
            <div class="p-4 border-t border-slate-100 bg-white flex flex-col shrink-0 h-[60%] overflow-y-auto">
                <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">3. Configuration</h2>
                
                <div id="noSelectionPane" class="text-center py-4 text-slate-400 text-xs italic">
                    Select a node or link to edit.
                </div>

                <div id="propertiesPane" class="hidden flex-col gap-3 pb-6">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Name</label>
                        <input type="text" id="propName" class="w-full border border-slate-300 rounded px-2 py-1 text-sm focus:outline-blue-500">
                    </div>
                    
                    <div id="nodeOnlyProps">
                        <!-- Primary Networking: IP alongside Subnet & Ports -->
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <div>
                                <div class="flex justify-between items-end mb-1">
                                    <label class="block text-[10px] font-bold text-slate-500 uppercase">IPs (CIDR)</label>
                                    <button id="addIpBtn" class="text-[10px] text-blue-600 hover:underline font-bold">+ IP</button>
                                </div>
                                <div id="ipListContainer" class="flex flex-col gap-2">
                                    <!-- Injected via JS -->
                                </div>
                            </div>
                            <div class="flex flex-col gap-2">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Subnet Mask</label>
                                    <input type="text" id="propMask" placeholder="255.255.255.0" class="w-full border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Port(s)</label>
                                    <input type="text" id="propPorts" placeholder="80, 443" class="w-full border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500">
                                </div>
                            </div>
                        </div>

                        <!-- Routing -->
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Gateway</label>
                                <input type="text" id="propGw" placeholder="e.g. 10.0.0.1" class="w-full border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">DNS</label>
                                <input type="text" id="propDns" placeholder="e.g. 8.8.8.8" class="w-full border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500">
                            </div>
                        </div>

                        <!-- Advanced Tags -->
                        <div class="grid grid-cols-2 gap-2 mb-2 pt-2 border-t border-slate-100">
                            <div class="col-span-2">
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">OS</label>
                                <input type="text" id="propOs" list="osDatalist" placeholder="Linux / Windows / IOS" class="w-full border border-slate-300 rounded px-2 py-1 text-xs focus:outline-blue-500">
                                <datalist id="osDatalist"></datalist>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">SSH Ver</label>
                                <input type="text" id="propSsh" placeholder="OpenSSH 8.9" class="w-full border border-slate-300 rounded px-2 py-1 text-xs focus:outline-blue-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Cert</label>
                                <input type="text" id="propCert" placeholder="RSA Exp 2026" class="w-full border border-slate-300 rounded px-2 py-1 text-xs focus:outline-blue-500">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Info / Notes</label>
                            <textarea id="propNotes" rows="3" placeholder="Relevant configuration notes..." class="w-full border border-slate-300 rounded px-2 py-1 text-xs focus:outline-blue-500"></textarea>
                        </div>
                    </div>

                    <div class="pt-2 border-t border-slate-100 mt-auto">
                        <button id="deleteElementBtn" class="w-full bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 py-1.5 rounded text-xs font-bold transition flex justify-center items-center gap-1">
                            <span>🗑️</span> Delete Selected
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="flex-1 relative overflow-hidden grid-bg" id="canvasContainer">
            <div class="absolute bottom-4 right-4 z-10 flex flex-col bg-white rounded shadow-md border border-slate-200 text-slate-600">
                <button id="zoomInBtn" class="p-2 hover:bg-slate-100 border-b border-slate-200" title="Zoom In">➕</button>
                <button id="zoomResetBtn" class="p-2 hover:bg-slate-100 border-b border-slate-200 font-bold text-xs" title="Reset View">1:1</button>
                <button id="zoomOutBtn" class="p-2 hover:bg-slate-100" title="Zoom Out">➖</button>
            </div>
            <div class="absolute bottom-4 left-4 z-10 text-[10px] text-slate-500 bg-white/80 px-2 py-1 rounded shadow-sm">
                Pan: Middle-Click Drag | Zoom: Scroll | Delete: Del | Deselect: Esc
            </div>

            <!-- SVG Canvas -->
            <svg id="networkCanvas" class="w-full h-full absolute inset-0 select-none">
                <g id="workspace"></g>
            </svg>
        </main>
        
        <!-- Conflict Alert Overlay -->
        <div id="conflictAlert" class="absolute top-4 right-4 bg-amber-50 border-l-4 border-amber-500 rounded p-3 shadow-lg max-w-md hidden z-20 transition-all">
            <div class="flex gap-2">
                <span class="text-amber-500 font-bold text-lg">⚠️</span>
                <div class="flex-1">
                    <h4 class="text-xs font-bold text-amber-900 uppercase">Validation Alerts</h4>
                    <ul id="conflictMsgList" class="text-[11px] text-amber-800 mt-1 list-disc pl-3 space-y-1"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            nodes: [], links: [],
            selectedId: null, selectedType: null,
            mode: 'drag', 
            linkSourceId: null,
            settings: { showConflicts: true },
            camera: { x: 0, y: 0, zoom: 1 }
        };

        const GRID_SNAP = 20;

        const icons = {
            cloud: '☁️', router: '⎔', firewall: '🧱', switch: '☴', server: '🖥️', pc: '💻', iot: '📡', dicom: '🏥', custom: '📦'
        };

        const initialDataDefaults = {
            cloud: { os: 'Cloud-Native', ports: '80, 443' },
            router: { os: 'Cisco IOS', ports: '22, 179' },
            firewall: { os: 'pfSense', ports: '443, 22' },
            switch: { os: 'SwitchOS', ports: '22' },
            server: { os: 'Linux Ubuntu', ports: '80, 443, 22' },
            pc: { os: 'Windows 11', ports: '' },
            iot: { os: 'FreeRTOS', ports: '1883' },
            dicom: { os: 'Windows Embedded', ports: '104, 443' },
            custom: { os: '', ports: '' }
        };

        // DOM Elements
        const canvasContainer = document.getElementById('canvasContainer');
        const canvas = document.getElementById('networkCanvas');
        const workspace = document.getElementById('workspace');
        const propertiesPane = document.getElementById('propertiesPane');
        const noSelectionPane = document.getElementById('noSelectionPane');
        const nodeOnlyProps = document.getElementById('nodeOnlyProps');
        const ipListContainer = document.getElementById('ipListContainer');
        const conflictAlert = document.getElementById('conflictAlert');
        const conflictMsgList = document.getElementById('conflictMsgList');
        const osDatalist = document.getElementById('osDatalist');

        // Interaction state
        let isDraggingCanvas = false;
        let isDraggingNode = false;
        let draggedNode = null;
        let dragOffset = { x: 0, y: 0 };
        let lastMouse = { x: 0, y: 0 };

        function parseValidCIDR(cidrStr) {
            try {
                if (!cidrStr.includes('/')) return null;
                const [ipStr, prefix] = cidrStr.split('/');
                const ip = ipaddr.parse(ipStr);
                const cidr = ipaddr.parseCIDR(cidrStr);
                return { ip, prefix: parseInt(prefix, 10), kind: ip.kind(), cidrObj: cidr };
            } catch (e) { return null; }
        }

        function validateTopology() {
            if (!state.settings.showConflicts) {
                conflictAlert.classList.add('hidden');
                return;
            }
            const errors = [];
            const ipMap = {};
            
            state.nodes.forEach(n => {
                (n.ips || []).forEach(ipStr => {
                    const parsed = parseValidCIDR(ipStr);
                    if (parsed) {
                        const cleanIP = parsed.ip.toString();
                        if (ipMap[cleanIP]) ipMap[cleanIP].push(n.name);
                        else ipMap[cleanIP] = [n.name];
                    }
                });
            });
            Object.entries(ipMap).forEach(([ip, names]) => {
                if (names.length > 1) errors.push(`IP Conflict: ${ip} is assigned to ${names.join(' and ')}.`);
            });

            state.nodes.forEach(n => {
                const validIPs = (n.ips || []).map(parseValidCIDR).filter(i => i !== null);
                if (n.gw && validIPs.length > 0) {
                    try {
                        const gwIp = ipaddr.parse(n.gw);
                        const gwReachable = validIPs.some(local => gwIp.match(local.cidrObj));
                        if (!gwReachable) errors.push(`${n.name}: Gateway ${n.gw} is unreachable (not on any assigned subnet).`);
                    } catch (e) { errors.push(`${n.name}: Invalid Gateway format.`); }
                }
                if (n.dns && validIPs.length > 0) {
                    try {
                        const dnsIp = ipaddr.parse(n.dns);
                        const isLocal = validIPs.some(local => dnsIp.match(local.cidrObj));
                        if (!isLocal && !n.gw) errors.push(`${n.name}: DNS ${n.dns} is external, but no default Gateway is configured.`);
                    } catch (e) { errors.push(`${n.name}: Invalid DNS format.`); }
                }
            });

            state.links.forEach(link => {
                const a = state.nodes.find(x => x.id === link.source);
                const b = state.nodes.find(x => x.id === link.target);
                if (!a || !b || a.type === 'switch' || b.type === 'switch' || a.type === 'cloud' || b.type === 'cloud') return;

                const ipsA = (a.ips || []).map(parseValidCIDR).filter(i => i !== null);
                const ipsB = (b.ips || []).map(parseValidCIDR).filter(i => i !== null);

                if (ipsA.length > 0 && ipsB.length > 0) {
                    let hasMatchingSubnet = false;
                    for (let ipA of ipsA) {
                        for (let ipB of ipsB) {
                            if (ipA.kind === ipB.kind && ipA.ip.match(ipB.cidrObj) && ipB.ip.match(ipA.cidrObj)) {
                                hasMatchingSubnet = true; break;
                            }
                        }
                    }
                    if (!hasMatchingSubnet) errors.push(`Subnet Mismatch: Direct link between ${a.name} & ${b.name} lacks a shared subnet.`);
                }
            });

            if (errors.length > 0) {
                conflictMsgList.innerHTML = errors.map(e => `<li>${e}</li>`).join('');
                conflictAlert.classList.remove('hidden');
            } else {
                conflictAlert.classList.add('hidden');
            }
        }

        function updateOSDatalist() {
            const osSet = new Set();
            state.nodes.forEach(n => {
                if (n.os && n.os.trim() !== '') osSet.add(n.os.trim());
            });
            osDatalist.innerHTML = '';
            osSet.forEach(os => {
                const opt = document.createElement('option');
                opt.value = os;
                osDatalist.appendChild(opt);
            });
        }

        function applyCamera() {
            workspace.setAttribute('transform', `translate(${state.camera.x}, ${state.camera.y}) scale(${state.camera.zoom})`);
            const bgSize = GRID_SNAP * state.camera.zoom;
            canvasContainer.style.backgroundSize = `${bgSize}px ${bgSize}px`;
            canvasContainer.style.backgroundPosition = `${state.camera.x}px ${state.camera.y}px`;
        }

        function renderCanvasOnly() {
            workspace.innerHTML = '';
            
            state.links.forEach(link => {
                const src = state.nodes.find(n => n.id === link.source);
                const tgt = state.nodes.find(n => n.id === link.target);
                if (!src || !tgt) return;

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', src.x); line.setAttribute('y1', src.y);
                line.setAttribute('x2', tgt.x); line.setAttribute('y2', tgt.y);
                
                const isSel = state.selectedId === link.id && state.selectedType === 'link';
                line.setAttribute('stroke', isSel ? '#3b82f6' : '#94a3b8');
                line.setAttribute('stroke-width', isSel ? '4' : '2.5');
                line.setAttribute('class', 'cursor-pointer transition-colors');
                line.addEventListener('mousedown', (e) => { e.stopPropagation(); select(link.id, 'link'); });
                workspace.appendChild(line);
            });

            state.nodes.forEach(node => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('transform', `translate(${node.x}, ${node.y})`);
                g.setAttribute('class', state.mode === 'drag' ? 'cursor-grab active:cursor-grabbing' : 'cursor-crosshair');

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', '-30'); rect.setAttribute('y', '-30');
                rect.setAttribute('width', '60'); rect.setAttribute('height', '60');
                rect.setAttribute('rx', '8');
                
                const isSel = state.selectedId === node.id && state.selectedType === 'node';
                rect.setAttribute('fill', isSel ? '#eff6ff' : '#ffffff');
                rect.setAttribute('stroke', isSel ? '#3b82f6' : '#cbd5e1');
                rect.setAttribute('stroke-width', isSel ? '2.5' : '1.5');
                rect.style.transition = 'all 0.1s ease';
                g.appendChild(rect);

                const icon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                icon.setAttribute('text-anchor', 'middle'); icon.setAttribute('y', '8');
                icon.setAttribute('font-size', '24');
                icon.textContent = icons[node.type] || '📦';
                icon.style.pointerEvents = 'none';
                g.appendChild(icon);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('text-anchor', 'middle'); label.setAttribute('y', '46');
                label.setAttribute('font-size', '11'); label.setAttribute('font-weight', '600');
                label.setAttribute('fill', '#334155');
                label.textContent = node.name;
                label.style.pointerEvents = 'none';
                g.appendChild(label);

                if (node.ips && node.ips.length > 0 && node.ips[0].trim() !== "") {
                    const ipLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    ipLabel.setAttribute('text-anchor', 'middle'); ipLabel.setAttribute('y', '58');
                    ipLabel.setAttribute('font-size', '9'); ipLabel.setAttribute('font-family', 'monospace');
                    ipLabel.setAttribute('fill', '#64748b');
                    ipLabel.textContent = node.ips[0] + (node.ips.length > 1 ? ` (+${node.ips.length-1})` : '');
                    ipLabel.style.pointerEvents = 'none';
                    g.appendChild(ipLabel);
                }

                g.addEventListener('mousedown', (e) => {
                    e.stopPropagation();
                    if (state.mode === 'drag') {
                        isDraggingNode = true; draggedNode = node;
                        const pt = getWorkspacePoint(e.clientX, e.clientY);
                        dragOffset.x = pt.x - node.x; dragOffset.y = pt.y - node.y;
                        select(node.id, 'node');
                    } else if (state.mode === 'link') {
                        if (!state.linkSourceId) state.linkSourceId = node.id;
                        else {
                            if (state.linkSourceId !== node.id) {
                                const dup = state.links.find(l => 
                                    (l.source === state.linkSourceId && l.target === node.id) || 
                                    (l.source === node.id && l.target === state.linkSourceId));
                                if (!dup) state.links.push({ id: 'l_' + Date.now(), source: state.linkSourceId, target: node.id });
                            }
                            state.linkSourceId = null;
                            save(); renderCanvasOnly();
                        }
                    }
                });
                workspace.appendChild(g);
            });

            validateTopology();
        }

        function renderSidebarIPs(node) {
            ipListContainer.innerHTML = '';
            node.ips = node.ips || [];
            
            if (node.ips.length === 0) {
                ipListContainer.innerHTML = `<span class="text-[10px] text-slate-400 italic">No IPs configured.</span>`;
            }

            node.ips.forEach((ip, index) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-1";
                
                const input = document.createElement('input');
                input.type = 'text'; input.value = ip;
                input.placeholder = "CIDR";
                input.className = "flex-1 border border-slate-300 rounded px-2 py-1 text-xs font-mono focus:outline-blue-500 w-full";
                
                const parsed = parseValidCIDR(ip);
                if (ip.trim() !== '' && !parsed) input.classList.add('border-red-400', 'bg-red-50');
                
                input.addEventListener('input', (e) => {
                    node.ips[index] = e.target.value;
                    const isValid = parseValidCIDR(node.ips[index]);
                    if (node.ips[index].trim() !== '' && !isValid) {
                        input.classList.add('border-red-400', 'bg-red-50');
                    } else {
                        input.classList.remove('border-red-400', 'bg-red-50');
                    }
                    save(); renderCanvasOnly();
                });

                const delBtn = document.createElement('button');
                delBtn.innerHTML = '✖';
                delBtn.className = "text-slate-400 hover:text-red-500 px-1";
                delBtn.onclick = () => {
                    node.ips.splice(index, 1);
                    save(); renderCanvasOnly(); renderSidebarIPs(node);
                };

                div.appendChild(input); div.appendChild(delBtn);
                ipListContainer.appendChild(div);
            });
        }

        function select(id, type) {
            state.selectedId = id; state.selectedType = type;
            state.linkSourceId = null; 
            
            if (!id) {
                propertiesPane.classList.add('hidden');
                noSelectionPane.classList.remove('hidden');
                renderCanvasOnly();
                return;
            }

            noSelectionPane.classList.add('hidden');
            propertiesPane.classList.remove('hidden'); propertiesPane.classList.add('flex');

            if (type === 'node') {
                const n = state.nodes.find(x => x.id === id);
                document.getElementById('propName').value = n.name || '';
                document.getElementById('propName').disabled = false;
                document.getElementById('propGw').value = n.gw || '';
                document.getElementById('propDns').value = n.dns || '';
                document.getElementById('propOs').value = n.os || '';
                document.getElementById('propMask').value = n.mask || '255.255.255.0';
                document.getElementById('propPorts').value = n.ports || '';
                document.getElementById('propSsh').value = n.ssh || '';
                document.getElementById('propCert').value = n.cert || '';
                document.getElementById('propNotes').value = n.notes || '';
                
                nodeOnlyProps.classList.remove('hidden');
                renderSidebarIPs(n);
            } else {
                const l = state.links.find(x => x.id === id);
                const a = state.nodes.find(x => x.id === l.source);
                const b = state.nodes.find(x => x.id === l.target);
                document.getElementById('propName').value = `${a.name} ↔ ${b.name}`; 
                document.getElementById('propName').disabled = true;
                nodeOnlyProps.classList.add('hidden');
            }
            renderCanvasOnly();
        }

        function deleteSelected() {
            if (!state.selectedId) return;
            if (state.selectedType === 'node') {
                state.nodes = state.nodes.filter(n => n.id !== state.selectedId);
                state.links = state.links.filter(l => l.source !== state.selectedId && l.target !== state.selectedId);
            } else {
                state.links = state.links.filter(l => l.id !== state.selectedId);
            }
            select(null, null); save(); renderCanvasOnly();
        }

        // Global Handlers
        function getWorkspacePoint(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left - state.camera.x) / state.camera.zoom,
                y: (clientY - rect.top - state.camera.y) / state.camera.zoom
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 1 || e.button === 0) {
                isDraggingCanvas = true; lastMouse = { x: e.clientX, y: e.clientY };
                if(e.button === 0 && !isDraggingNode) select(null, null);
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDraggingCanvas && !isDraggingNode) {
                state.camera.x += (e.clientX - lastMouse.x);
                state.camera.y += (e.clientY - lastMouse.y);
                lastMouse = { x: e.clientX, y: e.clientY };
                applyCamera();
            } else if (isDraggingNode && draggedNode) {
                const pt = getWorkspacePoint(e.clientX, e.clientY);
                draggedNode.x = Math.round((pt.x - dragOffset.x) / GRID_SNAP) * GRID_SNAP;
                draggedNode.y = Math.round((pt.y - dragOffset.y) / GRID_SNAP) * GRID_SNAP;
                renderCanvasOnly();
            }
        });

        window.addEventListener('mouseup', () => {
            isDraggingCanvas = false;
            if (isDraggingNode) { isDraggingNode = false; draggedNode = null; save(); }
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left; const mouseY = e.clientY - rect.top;
            const newZoom = Math.min(Math.max(0.2, state.camera.zoom * Math.exp(-e.deltaY * 0.001)), 5);
            state.camera.x = mouseX - (mouseX - state.camera.x) * (newZoom / state.camera.zoom);
            state.camera.y = mouseY - (mouseY - state.camera.y) * (newZoom / state.camera.zoom);
            state.camera.zoom = newZoom;
            applyCamera();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            const activeTag = document.activeElement.tagName;
            if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;
            if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
            if (e.key === 'Escape') select(null, null);
        });

        // Serialization
        function save() {
            try {
                const cleanNodes = state.nodes.map(n => ({
                    id: n.id, type: n.type, name: n.name, x: n.x, y: n.y, 
                    ips: n.ips.filter(i => i.trim() !== ''), 
                    gw: n.gw, dns: n.dns, os: n.os, mask: n.mask, ports: n.ports, ssh: n.ssh, cert: n.cert, notes: n.notes
                }));
                const payload = JSON.stringify({ nodes: cleanNodes, links: state.links });
                window.history.replaceState(null, '', '#' + btoa(encodeURIComponent(payload)));
                updateOSDatalist();
            } catch (err) { console.error(err); }
        }

        function load() {
            const hash = window.location.hash.substring(1);
            if (!hash) {
                state.nodes = [
                    { id: "n1", type: "router", name: "Core Router", x: 400, y: 160, ips: ["10.0.0.1/24", "2001:db8::1/64"], os: 'Cisco IOS', mask: '255.255.255.0', ports: '22' },
                    { id: "n2", type: "switch", name: "Switch", x: 400, y: 280, ips: [], os: 'SwitchOS', mask: '255.255.255.0' },
                    { id: "n3", type: "server", name: "Database", x: 260, y: 400, ips: ["10.0.0.10/24"], gw: "10.0.0.1", os: "Linux Ubuntu", mask: '255.255.255.0', ports: '3306, 22' },
                    { id: "n4", type: "pc", name: "Client", x: 540, y: 400, ips: ["10.0.0.50/24"], gw: "10.0.0.1", os: "Windows 11", mask: '255.255.255.0' }
                ];
                state.links = [{ id: "l1", source: "n1", target: "n2" }, { id: "l2", source: "n2", target: "n3" }, { id: "l3", source: "n2", target: "n4" }];
                updateOSDatalist();
                return;
            }
            try {
                const parsed = JSON.parse(decodeURIComponent(atob(hash)));
                state.nodes = (parsed.nodes || []).map(n => { n.ips = n.ips || []; return n; });
                state.links = parsed.links || [];
                updateOSDatalist();
            } catch (e) { console.error("Load err", e); }
        }

        // UI Bindings
        document.querySelectorAll('.palette-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.getAttribute('data-type');
                const rect = canvas.getBoundingClientRect();
                let spawnX = (rect.width / 2 - state.camera.x) / state.camera.zoom;
                let spawnY = (rect.height / 2 - state.camera.y) / state.camera.zoom;
                const offset = (state.nodes.length % 6) * 20;
                spawnX = Math.round((spawnX + offset) / GRID_SNAP) * GRID_SNAP;
                spawnY = Math.round((spawnY + offset) / GRID_SNAP) * GRID_SNAP;

                const defaults = initialDataDefaults[type] || { os: '', ports: '' };

                const newNode = {
                    id: 'n_' + Date.now(), type: type, name: `New ${type.charAt(0).toUpperCase() + type.slice(1)}`,
                    x: spawnX, y: spawnY, ips: [], gw: '', dns: '', 
                    os: defaults.os, mask: '255.255.255.0', ports: defaults.ports, ssh: '', cert: '', notes: ''
                };
                state.nodes.push(newNode);
                select(newNode.id, 'node'); save(); renderCanvasOnly();
            });
        });

        document.getElementById('toggleConflicts').addEventListener('change', (e) => { state.settings.showConflicts = e.target.checked; validateTopology(); });

        const mDrag = document.getElementById('modeDrag');
        const mLink = document.getElementById('modeLink');
        mDrag.onclick = () => {
            state.mode = 'drag'; state.linkSourceId = null;
            mDrag.className = "flex-1 text-center py-1 text-xs font-medium rounded bg-white text-slate-900 shadow-sm transition";
            mLink.className = "flex-1 text-center py-1 text-xs font-medium rounded text-slate-600 hover:text-slate-900 transition";
            renderCanvasOnly();
        };
        mLink.onclick = () => {
            state.mode = 'link'; select(null, null);
            mLink.className = "flex-1 text-center py-1 text-xs font-medium rounded bg-white text-slate-900 shadow-sm transition";
            mDrag.className = "flex-1 text-center py-1 text-xs font-medium rounded text-slate-600 hover:text-slate-900 transition";
            renderCanvasOnly();
        };

        ['Name', 'Gw', 'Dns', 'Os', 'Mask', 'Ports', 'Ssh', 'Cert', 'Notes'].forEach(key => {
            document.getElementById('prop' + key).addEventListener('input', (e) => {
                if (state.selectedId && state.selectedType === 'node') {
                    state.nodes.find(n => n.id === state.selectedId)[key.toLowerCase()] = e.target.value;
                    save(); renderCanvasOnly();
                }
            });
        });

        document.getElementById('addIpBtn').onclick = () => {
            if (state.selectedId && state.selectedType === 'node') {
                const n = state.nodes.find(n => n.id === state.selectedId);
                n.ips.push('');
                renderSidebarIPs(n); save(); renderCanvasOnly();
            }
        };
        
        document.getElementById('deleteElementBtn').onclick = deleteSelected;
        document.getElementById('zoomInBtn').onclick = () => { state.camera.zoom = Math.min(5, state.camera.zoom * 1.2); applyCamera(); };
        document.getElementById('zoomOutBtn').onclick = () => { state.camera.zoom = Math.max(0.2, state.camera.zoom / 1.2); applyCamera(); };
        document.getElementById('zoomResetBtn').onclick = () => { state.camera.x = 0; state.camera.y = 0; state.camera.zoom = 1; applyCamera(); };
        document.getElementById('clearCanvasBtn').onclick = () => { if(confirm("Clear canvas?")) { state.nodes = []; state.links = []; save(); select(null,null); } };
        document.getElementById('copyUrlBtn').onclick = () => { navigator.clipboard.writeText(window.location.href).then(() => alert("URL Copied!")); };

        document.getElementById('exportImageBtn').onclick = () => {
            const svgString = new XMLSerializer().serializeToString(canvas);
            const blob = new Blob([svgString], {type: "image/svg+xml;charset=utf-8"});
            const url = URL.createObjectURL(blob);
            const img = new Image();
            img.onload = () => {
                const tCanvas = document.createElement("canvas");
                const rect = canvas.getBoundingClientRect();
                tCanvas.width = rect.width; tCanvas.height = rect.height;
                const ctx = tCanvas.getContext("2d");
                ctx.fillStyle = "#f8fafc"; ctx.fillRect(0,0, tCanvas.width, tCanvas.height);
                ctx.fillStyle = "#cbd5e1";
                const bgSize = GRID_SNAP * state.camera.zoom;
                for(let x = state.camera.x % bgSize; x < tCanvas.width; x += bgSize) {
                    for(let y = state.camera.y % bgSize; y < tCanvas.height; y += bgSize) {
                        ctx.beginPath(); ctx.arc(x, y, 1, 0, Math.PI*2); ctx.fill();
                    }
                }
                ctx.drawImage(img, 0, 0);
                const a = document.createElement("a");
                a.href = tCanvas.toDataURL("image/png"); a.download = "network.png"; a.click();
                URL.revokeObjectURL(url);
            };
            img.src = url;
        };

        window.addEventListener('popstate', () => { load(); renderCanvasOnly(); });
        load(); applyCamera(); renderCanvasOnly();

    </script>
</body>
</html>
